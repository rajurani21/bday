<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Happy Birthday Potti 💖</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:black;
      position:relative;
    }

    /* Background Image */

    .bg-image{

      position:absolute;
      width:100%;
      height:100%;

      object-fit:cover;
      object-position:center;

      filter:brightness(0.5);

      z-index:-2;

    }

    /* Floating Hearts */

    .heart{

      position:absolute;
      color:white;
      animation:float 8s linear infinite;
      opacity:0.7;

    }

    @keyframes float{

      0%{
        transform:translateY(100vh) scale(0);
        opacity:0;
      }

      30%{
        opacity:1;
      }

      100%{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
      }

    }

    /* Main Container */

    .container{

      width:90%;
      max-width:900px;

      text-align:center;
      color:white;

      padding:20px;

      animation:fadeIn 2s ease;

      z-index:2;

    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    h1{

      font-size:clamp(2rem,5vw,4rem);

      margin-bottom:20px;

      text-shadow:0 0 25px #ff4fa3;

    }

    .quote{

      font-size:clamp(1rem,2.5vw,2rem);

      line-height:1.8;

      margin-top:20px;

      min-height:120px;

      transition:0.5s;

      text-shadow:0 0 10px rgba(0,0,0,0.6);

    }

    /* Button */

    button{

      margin-top:30px;

      padding:15px 40px;

      border:none;

      border-radius:50px;

      background:white;

      color:#ff4fa3;

      font-size:1.1rem;

      font-weight:600;

      cursor:pointer;

      transition:0.4s;

      box-shadow:0 5px 20px rgba(0,0,0,0.3);

    }

    button:hover{

      transform:scale(1.08);

      background:#ff4fa3;

      color:white;

    }

    /* FINAL SCREEN */

    .final-screen{

      position:fixed;

      top:0;
      left:0;

      width:100%;
      height:100%;

      background:black;

      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;

      opacity:0;
      visibility:hidden;

      transition:1.5s ease;

      z-index:9999;

    }

    .final-screen.show{

      opacity:1;
      visibility:visible;

    }

    .final-screen img{

      position:absolute;

      top:0;
      left:0;

      width:100vw;
      height:100vh;

      object-fit:cover;
      object-position:center;

      animation:zoomEffect 6s ease forwards;

    }

    @keyframes zoomEffect{

      from{
        transform:scale(1.4);
      }

      to{
        transform:scale(1);
      }

    }

    .dark-overlay{

      position:absolute;

      width:100%;
      height:100%;

      background:rgba(0,0,0,0.35);

    }

    .final-text{

  position:absolute;

  top:8%;

  left:50%;

  transform:translateX(-50%);

  z-index:2;

  color:white;

  text-align:center;

  width:100%;

  padding:20px;

  animation:textFade 3s ease;

}

.final-text h2{

  font-size:clamp(2.5rem,7vw,5rem);

  text-shadow:
  0 0 10px #ff4fa3,
  0 0 20px #ff4fa3,
  0 0 40px #ff4fa3;

}
    @keyframes textFade{

      from{
        opacity:0;
        transform:translateY(50px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

  </style>
</head>

<body>

  <!-- Background Image -->

  <!-- Replace bg.jpeg with your image -->

  

  <!-- Floating Hearts -->

  <script>

    for(let i=0;i<35;i++){

      let heart=document.createElement("div");

      heart.className="heart";

      heart.innerHTML="💖";

      heart.style.left=Math.random()*100+"vw";

      heart.style.fontSize=(15+Math.random()*25)+"px";

      heart.style.animationDuration=(5+Math.random()*5)+"s";

      document.body.appendChild(heart);

    }

  </script>

  <!-- MAIN QUOTES SECTION -->

  <div class="container">

    

    <div class="quote" id="quote">

      “Today is your day to smile brighter than ever ✨💖”

    </div>

    <button onclick="changeQuote()">

      Next Surprise ✨

    </button>

  </div>

  <!-- FINAL FULLSCREEN PHOTO -->

  <div class="final-screen" id="finalScreen">

    <!-- Replace potti.jpeg with your final image -->

    <img src="potti.jpeg" alt="Potti">

    <div class="dark-overlay"></div>

    <div class="final-text">

      <h2>
        Happy Birthday Potti 💖
      </h2>

    </div>

  </div>

  <!-- JavaScript -->

  <script>

    const quotes = [

      

      `"No matter where life takes us,
      our friendship will always stay special forever 🌸"`,

      `"Some people make life beautiful...
      and you are one of them ✨"`,

      `"Your smile can light up even the darkest days 🌙💫"`,

      `"I’m lucky to have you in my life 💖"`,

      `"May your birthday be as beautiful,
      kind, and wonderful as your heart 🎂"`,

      `"Every memory with you becomes my favorite memory 💫"`

    ];

    let count = 0;

    function changeQuote(){

      if(count < quotes.length){

        document.getElementById("quote").innerHTML = quotes[count];

        count++;

      }

      else{

        document.querySelector(".container").style.display = "none";

        document.getElementById("finalScreen").classList.add("show");

      }

    }

  </script>

</body>
</html>
