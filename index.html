<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 💖</title>

<style>
body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(180deg,#000,#1a0512,#b76e79);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins',Arial,sans-serif;
    color:#fff;
    overflow:hidden;
}

/* Animated gradient waves */
body::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent,rgba(255,215,0,.08),transparent);
    animation:wave 6s infinite linear;
}
@keyframes wave{
    from{transform:translateX(-100%);}
    to{transform:translateX(100%);}
}

/* Reel frame */
.reel{
    width:100%;
    max-width:460px;
    aspect-ratio:9/16;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    animation:camera 12s infinite alternate ease-in-out;
}
@keyframes camera{
    from{transform:scale(1);}
    to{transform:scale(1.05);}
}

/* Sparkles */
.sparkle{
    position:absolute;
    width:5px;
    height:5px;
    background:#ffd700;
    border-radius:50%;
    animation:twinkle 3s infinite;
}
@keyframes twinkle{
    0%,100%{opacity:.2;}
    50%{opacity:1;}
}

/* Hearts */
.heart{
    position:absolute;
    bottom:-40px;
    font-size:clamp(18px,4vw,24px);
    animation:floatHeart 6s linear infinite;
}
@keyframes floatHeart{
    to{transform:translateY(-120vh); opacity:0;}
}

/* Container */
.container{
    text-align:center;
    padding:clamp(16px,4vw,26px);
    animation:fade 1.2s ease;
}
@keyframes fade{
    from{opacity:0; transform:scale(.9);}
    to{opacity:1; transform:scale(1);}
}

/* Neon heading */
h1{
    font-size:clamp(28px,7vw,42px);
    text-shadow:0 0 10px #ffd700,0 0 20px #ff9aa2;
}

/* Card */
.card{
    background:rgba(255,215,0,0.12);
    backdrop-filter:blur(12px);
    padding:clamp(18px,4vw,26px);
    border-radius:22px;
    margin-top:20px;
    border:1px solid rgba(255,215,0,0.4);
    animation:glow 2s infinite alternate;
}
@keyframes glow{
    from{box-shadow:0 0 10px #ffd700;}
    to{box-shadow:0 0 35px #ff9aa2;}
}

/* Shimmer text */
p{
    font-size:clamp(16px,4vw,21px);
    line-height:1.7;
    background:linear-gradient(90deg,#fff,#ffd700,#fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmer 3s infinite;
}
@keyframes shimmer{
    from{background-position:0%;}
    to{background-position:200%;}
}

/* Balloons */
.balloon{
    position:absolute;
    bottom:-100px;
    font-size:clamp(26px,5vw,36px);
    animation:float 7s linear infinite;
}
@keyframes float{
    to{transform:translateY(-120vh);}
}

/* Fireworks */
.firework{
    position:absolute;
    font-size:clamp(20px,5vw,26px);
    animation:explode 1.2s ease forwards;
}
@keyframes explode{
    from{transform:scale(0); opacity:1;}
    to{transform:scale(2); opacity:0;}
}

/* Countdown */
#count{
    font-size:clamp(46px,10vw,64px);
    color:#ffd700;
    text-shadow:0 0 20px #ffd700;
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="birthday.mp3" type="audio/mpeg">
</audio>

<div class="reel">
    <div class="container">
        <h1 id="title">🎁 A Special Surprise</h1>
        <div class="card">
            <p id="text"></p>
        </div>
    </div>
</div>

<script>
const quotes=[
 "💖 A best friend like you makes life warmer and brighter.",
 "✨ Thank you for always standing by my side.",
 "🌸 Your smile turns ordinary days into special memories.",
 "💫 Distance and time can never weaken our bond.",
 "🌷 You are my safe place and my strength.",
 "💛 Every moment with you is a blessing.",
 "🌟 I’m proud and lucky to call you my best friend.",
 "🎂 Today is all about celebrating YOU."
];

let i=0;
const textEl=document.getElementById("text");
const titleEl=document.getElementById("title");
const music=document.getElementById("music");

function typeText(txt,cb){
    let j=0;
    textEl.innerHTML="";
    let t=setInterval(()=>{
        textEl.innerHTML+=txt[j++];
        if(j>=txt.length){
            clearInterval(t);
            if(cb) setTimeout(cb,1300);
        }
    },35);
}

function play(){
    if(i<quotes.length){
        typeText(quotes[i++],()=>setTimeout(play,1200));
    }else{
        countdown();
    }
}

function countdown(){
    titleEl.innerHTML="Final Surprise In";
    let c=3;
    textEl.innerHTML=c;
    let timer=setInterval(()=>{
        c--;
        textEl.innerHTML=c;
        if(c===0){
            clearInterval(timer);
            final();
        }
    },1000);
}

function final(){
    titleEl.innerHTML="🎉 Happy Birthday 🎉";
    textEl.innerHTML="💖 You are not just my best friend — you are my forever bond. I’m grateful for you today and always 💕";

    for(let k=0;k<30;k++){
        let f=document.createElement("div");
        f.className="firework";
        f.innerHTML="🎆";
        f.style.left=Math.random()*100+"vw";
        f.style.top=Math.random()*100+"vh";
        document.body.appendChild(f);
    }
}

/* Effects */
setInterval(()=>{
    let b=document.createElement("div");
    b.className="balloon";
    b.innerHTML="🎈";
    b.style.left=Math.random()*100+"vw";
    document.body.appendChild(b);

    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
},700);

/* Sparkles */
for(let s=0;s<50;s++){
 let sp=document.createElement("div");
 sp.className="sparkle";
 sp.style.left=Math.random()*100+"vw";
 sp.style.top=Math.random()*100+"vh";
 document.body.appendChild(sp);
}

/* Auto start */
music.play().catch(()=>{});
play();
</script>

</body>
</html>
