<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Happy Birthday Potti 💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff9ec4,#ffc3a0,#ffd6e0);
      position:relative;
    }

    /* Floating Hearts */

    .heart{
      position:absolute;
      color:white;
      animation:float 8s linear infinite;
      opacity:0.7;
    }

    @keyframes float{

      0%{
        transform:translateY(100vh) scale(0);
        opacity:0;
      }

      30%{
        opacity:1;
      }

      100%{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
      }

    }

    /* Main Card */

    .container{

      width:90%;
      max-width:700px;
      padding:40px;
      border-radius:30px;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(15px);
      text-align:center;
      color:white;
      box-shadow:0 10px 40px rgba(0,0,0,0.2);
      animation:fadeIn 2s ease;
      z-index:2;

    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    h1{
      font-size:3rem;
      margin-bottom:20px;
      animation:glow 2s infinite alternate;
    }

    @keyframes glow{

      from{
        text-shadow:0 0 10px #fff;
      }

      to{
        text-shadow:0 0 25px #ff4fa3;
      }

    }

    .quote{
      font-size:1.2rem;
      line-height:1.8;
      margin-top:20px;
      min-height:120px;
      transition:0.5s;
    }

    button{

      margin-top:25px;
      padding:14px 35px;
      border:none;
      border-radius:40px;
      background:white;
      color:#ff4fa3;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:0.4s;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);

    }

    button:hover{

      transform:scale(1.08);
      background:#ff4fa3;
      color:white;

    }

    /* Fullscreen Final Page */
    .final-page img{

        position:absolute;
        top:0;
        left:0;

        width:100vw;
        height:100vh;

        object-fit:cover;
        object-position:center;

        animation:zoomPhoto 6s ease forwards;

}

    

    .final-page.show{

      opacity:1;
      visibility:visible;

    }

    .final-page img{

      width:100%;
      height:100%;
      object-fit:cover;
      position:absolute;
      top:0;
      left:0;
      animation:zoomPhoto 6s ease forwards;

    }

    @keyframes zoomPhoto{

      from{
        transform:scale(1.3);
      }

      to{
        transform:scale(1);
      }

    }

    .overlay{

      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.35);

    }

    .birthday-message{

      position:relative;
      z-index:2;
      color:white;
      text-align:center;
      animation:messageFade 3s ease;
      padding:20px;

    }

    .birthday-message h2{

      font-size:4rem;
      text-shadow:0 0 20px #ff4fa3;

    }

    .birthday-message p{

      margin-top:15px;
      font-size:1.5rem;

    }

    @keyframes messageFade{

      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    @media(max-width:600px){

      h1{
        font-size:2.2rem;
      }

      .quote{
        font-size:1rem;
      }

      .birthday-message h2{
        font-size:2.5rem;
      }

      .birthday-message p{
        font-size:1.1rem;
      }

    }

  </style>
</head>

<body>

  <!-- Floating Hearts -->

  <script>

    for(let i=0;i<35;i++){

      let heart=document.createElement("div");

      heart.className="heart";

      heart.innerHTML="💖";

      heart.style.left=Math.random()*100+"vw";

      heart.style.fontSize=(15+Math.random()*25)+"px";

      heart.style.animationDuration=(5+Math.random()*5)+"s";

      document.body.appendChild(heart);

    }

  </script>

  <!-- Main Quotes Card -->

  <div class="container" id="mainCard">

    <h1>Happy Birthday Bestie 🎂</h1>

    <div class="quote" id="quote">

      "A best friend like you is a gift that life gives only once 💖"

    </div>

    <button onclick="changeQuote()">

      Next Surprise ✨

    </button>

  </div>

  <!-- Fullscreen Final Birthday Photo -->

  <div class="final-page" id="finalPage">

    <!-- Replace potti.jpg with your image -->

    <img src="potti.jpeg" alt="Potti">

    <div class="overlay"></div>

    <div class="birthday-message">

      <h2>Happy Birthday Potti 🎉💖</h2>

      <p>
        You are the most special person in my life ✨
      </p>

    </div>

  </div>

  <!-- JavaScript -->

  <script>

    const quotes = [

      `"You are not just my best friend...
      you are my safe place 💕"`,

      `"No matter where life takes us,
      our friendship will always stay special 🌸"`,

      `"Some people make life beautiful...
      and you are one of them ✨"`,

      `"Your smile can light up even the darkest days 🌙💫"`,

      `"I’m lucky to have you in my life 💖"`,

      `"May your birthday be as wonderful as your heart 🎂"`,

      `"Every memory with you becomes my favorite memory 💫"`

    ];

    let count = 0;

    function changeQuote(){

      if(count < quotes.length){

        document.getElementById("quote").innerHTML = quotes[count];

        count++;

      }

      else{

        document.getElementById("mainCard").style.display = "none";

        document.getElementById("finalPage").classList.add("show");

      }

    }

  </script>

</body>
</html>
